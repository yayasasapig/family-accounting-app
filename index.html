<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏠 家庭記帳 - 登入頁</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #FF8A5B 0%, #FFD166 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(26, 43, 74, 0.15);
      max-width: 380px;
      width: 90%;
    }
    
    .logo {
      font-size: 64px;
      margin-bottom: 16px;
    }
    
    h1 {
      color: #1A2B4A;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .slogan {
      color: #4A5568;
      font-size: 16px;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 24px;
      background: white;
      border: 2px solid #E5E7EB;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      color: #1A2B4A;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    
    .google-btn:hover {
      background: #F7F8FA;
      border-color: #FF8A5B;
      transform: translateY(-2px);
    }
    
    .google-btn svg {
      width: 24px;
      height: 24px;
    }
    
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #4A5568;
    }
    
    .page-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      padding: 12px;
      display: flex;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
    }
    
    .page-nav a {
      padding: 8px 16px;
      background: #F7F8FA;
      border-radius: 20px;
      text-decoration: none;
      color: #1A2B4A;
      font-size: 14px;
      transition: all 0.15s;
    }
    
    .page-nav a:hover, .page-nav a.active {
      background: #FF8A5B;
      color: white;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">🏠</div>
    <h1>家庭記帳</h1>
    <p class="slogan">記錄每一分<br>共同每一天</p>
    
    <button class="google-btn" onclick="alert('這是原型演示，按下去會跳轉 Google 登入')">
      <svg viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      以 Google 帳戶登入
    </button>
    
    <p class="footer">登入即表示你同意我們的服務條款</p>
  </div>
  
  <div class="page-nav">
    <a href="login.html" class="active">登入</a>
    <a href="dashboard.html">首頁</a>
    <a href="add.html">記帳</a>
    <a href="charts.html">圖表</a>
    <a href="settle.html">分帳</a>
    <a href="settings.html">設定</a>
  </div>
</body>
</html>
